# This is the most important part for your users!
# It groups your R functions by their biological/computational roles.
reference:
  - title: "Canonical Manifold Construction"
    [cite_start]desc: "Supervised RDA architecture to define the conical geometry[cite: 45, 173]."
    contents:
      - CanonicalTockySeq
      - plotCanonicalTocky
  - title: "Geodesic Trajectory Analysis"
    [cite_start]desc: "Methods for GradientTockySeq and piecewise SLERP interpolation."
    contents:
      - GradientTockySeq
      - fast_slerp
      - get_best_t_for_cell
      - get_norm
  - title: "Gene Dynamics and Temporal Cascades"
    [cite_start]desc: "Tools to identify and visualize gene-expression dynamics[cite: 83, 206]."
    contents:
      - SelectTockyGenes
      - RunTradeSeqTocky
      - PlotTockyHeatmap
      - plotGeneDynamics

